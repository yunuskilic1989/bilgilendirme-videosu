```html
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AKIM METAL - Ziyaretçi Bilgilendirme</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*,
*::before,
*::after{
box-sizing:border-box;
margin:0;
padding:0;
}

:root{
--steel:#1C2B3A;
--iron:#2E3F50;
--spark:#E8500A;
--spark-lt:#FF6B2B;
--silver:#B0BCC7;
--white:#FFFFFF;
--radius:8px;
--shadow:0 8px 30px rgba(0,0,0,.25);
}

html,body{
min-height:100%;
font-family:'Inter',sans-serif;
color:#fff;

background:
linear-gradient(rgba(28,43,58,.88),rgba(28,43,58,.88)),
url('https://raw.githubusercontent.com/yunuskilic1989/akimmetalfoto/61992a26c18ce0c2d50146d92a398e171644ec9c/AKIM%20METAL%20FOTOGRAFI.jpg');

background-size:cover;
background-position:center;
background-attachment:fixed;
}

header{
background:rgba(46,63,80,.92);
backdrop-filter:blur(8px);
border-bottom:2px solid var(--spark);
padding:18px 30px;

display:flex;
align-items:center;
gap:18px;
}

.logo-img{
width:75px;
height:auto;
}

.logo-text{
font-family:'Barlow Condensed',sans-serif;
font-size:32px;
font-weight:700;
letter-spacing:.05em;
}

.logo-text span{
color:var(--spark);
}

main{
max-width:760px;
margin:auto;
padding:50px 20px;
}

.card{
background:rgba(46,63,80,.88);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.08);
border-radius:8px;
padding:35px;
box-shadow:var(--shadow);
}

.eyebrow{
color:var(--spark);
font-size:12px;
font-weight:600;
letter-spacing:.15em;
margin-bottom:8px;
}

h1{
font-family:'Barlow Condensed',sans-serif;
font-size:34px;
margin-bottom:8px;
}

.subtitle{
color:var(--silver);
margin-bottom:30px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.full{
grid-column:1/-1;
}

label{
display:block;
margin-bottom:7px;
font-size:12px;
letter-spacing:.08em;
color:var(--silver);
}

input{
width:100%;
padding:13px 15px;
background:#1c2b3a;
border:1px solid rgba(255,255,255,.1);
border-radius:8px;
color:white;
outline:none;
}

input:focus{
border-color:var(--spark);
}

.btn{
width:100%;
margin-top:25px;
background:var(--spark);
border:none;
color:white;
padding:15px;
border-radius:8px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.btn:hover{
background:var(--spark-lt);
}

.video-header{
margin-bottom:20px;
background:rgba(46,63,80,.92);
padding:20px;
border-radius:8px;
box-shadow:var(--shadow);
}

.video-wrap{
position:relative;
width:100%;
aspect-ratio:16/9;
overflow:hidden;
border-radius:8px;
box-shadow:0 10px 35px rgba(0,0,0,.4);
}

.video-wrap iframe{
position:absolute;
width:100%;
height:100%;
border:none;
}

.progress-bar-wrap{
margin-top:20px;
background:rgba(255,255,255,.1);
height:6px;
border-radius:8px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--spark),var(--spark-lt));
}

.progress-label{
margin-top:8px;
font-size:13px;
color:var(--silver);
text-align:right;
}

.info-box{
margin-top:20px;
padding:15px;
border-left:4px solid var(--spark);
background:rgba(255,255,255,.05);
border-radius:8px;
color:#d2dae2;
}

.success-card{
background:rgba(46,63,80,.92);
padding:50px;
text-align:center;
border-radius:8px;
box-shadow:var(--shadow);
}

.checkmark{
width:70px;
height:70px;
border-radius:50%;
background:rgba(34,197,94,.2);
border:2px solid #22c55e;

display:flex;
justify-content:center;
align-items:center;

font-size:30px;
margin:auto auto 25px;
}

@media(max-width:600px){

.form-grid{
grid-template-columns:1fr;
}

.full{
grid-column:auto;
}

.logo-img{
width:55px;
}

.logo-text{
font-size:24px;
}

.card{
padding:25px;
}

}

</style>
</head>
<body>

<header>

<img
class="logo-img"
src="https://github.com/yunuskilic1989/akimmetallogo/raw/7696adbfeb27f4fd1aad47eb13b797214fac6ad6/AKIM%20METAL%20LOGO.jpg"
alt="AKIM METAL">

<div class="logo-text">
AKIM <span>METAL</span>
</div>

</header>

<main>

<div class="card">

<div class="eyebrow">
ZİYARETÇİ BİLGİLENDİRME
</div>

<h1>
İSG Bilgilendirme Videosu
</h1>

<p class="subtitle">
Lütfen bilgilerinizi doldurarak videoyu izlemeye başlayınız.
</p>

<div class="form-grid">

<div>
<label>Ad</label>
<input type="text" placeholder="Adınız">
</div>

<div>
<label>Soyad</label>
<input type="text" placeholder="Soyadınız">
</div>

<div>
<label>Telefon Numarası</label>
<input type="tel" placeholder="05XX XXX XX XX">
</div>

<div>
<label>E-Posta Adresi</label>
<input type="email" placeholder="ornek@mail.com">
</div>

<div class="full">
<label>Firmanız</label>
<input type="text" placeholder="Firma Adınız">
</div>

</div>

<button class="btn">
Videoyu İzlemeye Başla
</button>

</div>

<br>

<div class="video-header">

<div class="video-wrap">

<iframe
src="https://www.youtube.com/embed/Zyv5b4RR_ng"
allowfullscreen>
</iframe>

</div>

<div class="progress-bar-wrap">
<div class="progress-bar"></div>
</div>

<p class="progress-label">
%0 izlendi
</p>

<div class="info-box">
ℹ️ Video otomatik olarak takip edilmektedir. Sayfayı kapatmayınız.
</div>

</div>

</main>

</body>
</html>
```
